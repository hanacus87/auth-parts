name: Deploy AuthContainer

on:
  pull_request:
    paths:
      - "packages/auth-container/**"
      - "packages/auth-frontend/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"
  push:
    branches: [main]
    paths:
      - "packages/auth-container/**"
      - "packages/auth-frontend/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"

jobs:
  verify:
    name: Type-check & Build (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check auth-frontend
        run: pnpm --filter auth-frontend exec tsc -b --noEmit
      - name: Type-check auth-container
        run: pnpm --filter auth-container exec tsc --noEmit
      - name: Build auth-frontend
        run: pnpm --filter auth-frontend build
      - name: Wrangler dry-run deploy
        run: pnpm --filter auth-container exec wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    name: Deploy (production)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-auth-container-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build auth-frontend
        run: pnpm --filter auth-frontend build
      - name: Deploy Worker
        run: pnpm --filter auth-container exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
