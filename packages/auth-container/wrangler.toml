name = "auth-container"
main = "src/index.ts"
compatibility_date = "2025-04-01"
keep_vars = true
workers_dev = false

[dev]
port = 4000

# D1 バインディング
# 初回のみ `wrangler d1 create auth-container-prod` を実行し、出力される database_id で上書きすること
[[d1_databases]]
binding = "DB"
database_name = "auth-container-prod"
database_id = "d9c13080-fc2d-475b-b9c8-d33d15e5da5b"

# KV バインディング (レート制限用カウンタ)
# 初回のみ `wrangler kv namespace create auth-container-rate-limit` を実行して得た id を反映する。
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "6d667761f9b14303aad1a96404279c68"

# 月次の JWT 署名鍵ローテ / リタイアを自動実行する Cron Trigger。
[triggers]
crons = ["0 3 1 * *"]

# Static Assets (Vite で auth-frontend を build した成果物)
# SPA ルーティングは Hono の app.get("*") で index.html に fallback させる
[assets]
directory = "./dist-assets"
binding = "ASSETS"
not_found_handling = "none"

# Env vars (local: .dev.vars / remote: CF Dashboard):
#   ISSUER, ACCESS_TOKEN_TTL, ID_TOKEN_TTL, REFRESH_TOKEN_TTL, ENVIRONMENT, FROM_EMAIL, SESSION_SECRET, RESEND_API_KEY
